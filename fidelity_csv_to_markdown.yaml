contract:
  name: fidelity_positions_csv_to_markdown
  version: 3.0.0
  previous_version: 2.1.0
  effective_date: '2026-06-06'
  description: Fidelity positions CSV → one markdown file, grouped into a section per account, with all columns preserved and strict validation.
changelog:
- version: 3.0.0
  date: '2026-06-06'
  changes:
  - Multi-account output. The CSV is grouped by Account Number and rendered as
    one file with a portfolio header followed by a "## <Account Name>
    (<Account Number>)" section per account. A single-account export is the N=1
    case. Reverses the v2.x single-account requirement.
  - summary_header now governs the portfolio-level header (as_of + portfolio
    total summed across all accounts) and gains an account_index sub-block.
  - Add section_header (per-account subtotal) and sections (grouping +
    heading template) blocks under output.markdown.
  - filename_policy.pattern is now '{input_stem}.md' (derived from the input
    CSV filename, every account count). Retires the
    '{account_name}__{account_number}.md' naming.
- version: 2.1.0
  date: '2026-05-21'
  changes:
  - Add output.markdown.summary_header to emit an "As of:" line and column totals
    above the table. Aggregation is plain pass-through (sum of one column);
    see CLAUDE.md "Carve-out for plain aggregation".
- version: 2.0.0
  date: '2026-04-18'
  changes:
  - Add column_aliases map to input_cleanup (rename columns before processing).
  - Add drop_columns list to input_cleanup (intentionally remove columns from output).
- version: 1.0.0
  date: '2026-03-26'
  changes:
  - Derived from fidelity_positions_single_account_csv_to_parquet v1.0.0.
  - Replaced Parquet output with a single markdown table.
  - Removed lossless/optimized layer concept; all original columns preserved as-is.
  - Removed companion column derivation (__usd, __pct).
  - Verification is pre-write in-memory (no round-trip read-back required).
task: convert_fidelity_positions_csv_to_markdown
input:
  type: csv
  source: fidelity_positions_export
  characteristics:
  - positions_only
  - one_row_per_holding
  - may_contain_multiple_accounts
  - may_contain_trailing_commas
  - may_contain_footer_rows
  - values_may_include_currency_symbols
  - values_may_include_percentage_symbols
  - column_names_may_include_currency_or_percentage_symbols
validation:
  enforce_positions_format: true
  drop_non_position_rows: true
output:
  markdown:
    include_all_columns: true
    preserve_column_order: true
    preserve_string_values: true
    purpose: llm_analysis
    # The file is grouped into one section per account. group_by names the
    # column to split on; heading_template builds each section's H2 heading
    # from that account's first row. Account order is first-seen (no sorting).
    sections:
      group_by: Account Number
      heading_template: '{Account Name} ({Account Number})'
    # Portfolio-level header at the very top of the file. Always emitted when
    # enabled (including for a single-account export). as_of is searched once
    # across all cells pre-cleanup; totals sum the named column across ALL
    # accounts; account_index lists every account with its own subtotal. All
    # sums are plain single-column aggregations (CLAUDE.md carve-out) — no
    # ratios or percentages-of-portfolio. Set enabled: false to suppress.
    summary_header:
      enabled: true
      as_of:
        # Case-insensitive search across all cells (pre-cleanup). The captured
        # group is emitted verbatim as the "As of:" value. Missing is non-fatal.
        pattern: 'Date downloaded\s+(.+)'
      totals:
        # Plain sum of one column across all accounts, formatted as USD. Each
        # entry adds one "<label>: $X,XXX.XX" line. Unparseable cells (--,
        # blank) are skipped. Missing column is non-fatal.
        - label: Total Current Value
          column: Current value
      account_index:
        # One "- <name> (<number>): $X,XXX.XX" line per account, where the
        # amount is that account's sum of total_column. Set enabled: false to
        # omit the index.
        enabled: true
        label: Accounts
        total_column: Current value
    # Per-account subtotal printed under each section's heading. Same plain
    # single-column sum, scoped to that account. Set enabled: false to suppress.
    section_header:
      enabled: true
      totals:
        - label: Total Current Value
          column: Current value
    filename_policy:
      pattern: '{input_stem}.md'
constraints:
- no_silent_type_coercion
- no_column_renaming
- no_column_dropping
- preserve_original_string_values
input_cleanup:
  column_aliases: {}
  drop_columns: []
  drop_rows:
  - column: Account Number
    regex: Date downloaded
  footer_detection_policy:
    intent: Drop disclaimer/footer/metadata rows while never dropping legitimate holdings.
    do_not_use_as_markers:
    - fidelity
    prefer_disclaimer_markers:
    - the data and information in this spreadsheet
    - brokerage services are provided by fidelity brokerage
    - for informational purposes only
    - fidelity.com
    notes:
    - Generic brand tokens can appear in security names and must not be used as drop markers.
